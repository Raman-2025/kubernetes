kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: apache-manager
  namespace: apache
rules:
  - apiGroups: ["","apps","rbac.authorization.k8s.io"]
    resources: ["deployments","services","pods","horizontalpodautoscalers"] 
    verbs: ["get","apply","create","delete","watch","list"]  
