kind: Deployment
apiVersion: apps/v1
metadata:
  name: notes-app-deployment
  namespace: nginx
  labels:
    app: notes-app

spec:
  replicas: 1
  selector:
    matchLabels:
       app: notes-app
  
  template:
    metadata:
       name: notes-app-pod
       labels:
          app: notes-app

    spec:
      containers:
      - name: notes-app-cont
        image: raman20260/notes-app-k8s:latest    
        ports:
          - containerPort: 8000
        livenessProbe:
           httpGet:
             path: /
             port: 8000

