kind: CustomResourceDefinition
apiVersion: apiextensions.k8s.io/v1
metadata:
  name: devopsbatches.tws.com
spec:
  group: tws.com
  names:
    plural: devopsbatches
    singular: devopsbatch
    kind: DevOpsBatch
    shortNames:
      - batches
      - tws
      - junoon
  scope: Namespaced
  versions:
     - name: v1
       served: true
       storage: true
       schema: 
         openAPIV3Schema:
           type: object
           properties:
              spec:
                 type: object
                 properties: 
                     name:
                       type: string
                       description: "this is the name of the devops batch" 
                     duration:
                       type: string
                       description: "this is the duration of the devops batch"
                     platform:  
                       type: string
                       description: "this is the mode of the batch e.g. live/recorded"
                     mode:  
                       type: string
                       description: "this is the platform of the batch"
