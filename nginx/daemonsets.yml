kind: ReplicaSet
apiVersion: apps/v1
metadata:
  name: nginx-replicastes
  namespace: nginx

spec:
 replicas: 2
 selector:
  matchLabels:
    app: nginx

 template:
  metadata:
   name: nginx-rep-pod
   labels:
    app: nginx

  spec:
    containers:
     - name: nginx-cont
       image: nginx:latest
       ports:
         - containerPort: 80

